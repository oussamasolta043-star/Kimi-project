<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Kimi Project</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Amiri', serif;
            /* إضافة نقش هندسي كخلفية (يمكنك تغيير الرابط لصورة نقش تفضلها) */
            background-color: #f4eadd;
            background-image: url('https://www.transparenttextures.com/patterns/arabesque.png');
            margin: 0;
            padding: 20px;
        }
        .frame {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px;
            background: white;
            /* إطار مزدوج لإعطاء طابع زخرفي */
            border: 10px double #8b4513; 
            border-radius: 20px;
            box-shadow: 0 0 15px rgba(0,0,0,0.3);
            text-align: center;
        }
        h1 {
            color: #8b4513;
            border-bottom: 2px solid #8b4513;
            display: inline-block;
            padding-bottom: 10px;
        }
        .content {
            font-size: 1.4rem;
            color: #4a3728;
        }
    </style>
</head>
<body>

    <div class="frame">
        <h1>مشروع كيمي</h1>
        <div class="content">
            <p>بـسـم الله الـرحـمـن الـرحـيـم</p>
            <p>أهلاً بكم في رحاب موقعنا العلمي، حيث نجمع بين الأصالة والمعرفة.</p>
            <p>هنا ستجدون بحوثاً ومحاضرات مُنتقاة بعناية.</p>
        </div>
    </div>

</body>
</html>
