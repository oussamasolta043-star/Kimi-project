<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Kimi Project - المنصة العلمية</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Amiri', serif;
            margin: 0;
            padding: 0;
            background-color: #0b121f;
            /* المسار الصحيح للصورة */
            background-image: url('background.jpg'); 
            background-repeat: no-repeat;
            background-position: left center;
            background-size: contain;
            min-height: 100vh;
            color: #d4af37;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 50px 20px;
            text-align: center;
        }

        h1 { color: #d4af37; border-bottom: 2px solid #d4af37; padding-bottom: 10px; }
        
        .item { 
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 10px;
            border: 1px solid #d4af37;
        }

        .btn { 
            display: inline-block; 
            background: #d4af37; 
            color: #0b121f; 
            padding: 10px 25px; 
            text-decoration: none; 
            border-radius: 5px; 
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>مشروع كيمي</h1>
        <p>منصة متخصصة في تحليل الخطاب واللسانيات</p>

        <div class="item">
            <h3>مقاربة في تحليل الخطاب</h3>
            <a href="research1.pdf" class="btn">تحميل البحث (PDF)</a>
        </div>
    </div>

</body>
</html>
