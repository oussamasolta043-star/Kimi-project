<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Kimi Project - المنصة العلمية</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Amiri', serif;
            margin: 0;
            padding: 40px;
            /* تطبيق الصورة كخلفية */
            background-image: url('background-frame.jpg'); /* تأكد من اسم الصورة ومكانها */
            background-size: 100% 100%; /* تجعل الصورة تغطي كامل الشاشة */
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
        }
        
        .main-container {
            max-width: 700px;
            margin: 0 auto;
            padding: 80px; /* مسافة لتبقى النصوص داخل مساحة الإطار الأسود */
            color: #d4af37; /* لون ذهبي للنصوص ليتناسب مع الإطار */
            text-align: center;
        }

        h1 { font-size: 3rem; color: #d4af37; }
        
        .btn { 
            display: inline-block; background: #d4af37; color: #000; 
            padding: 10px 25px; text-decoration: none; border-radius: 5px; 
            margin-top: 20px; font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <h1>مشروع كيمي</h1>
        <p>مرحباً بكم في رحاب اللسانيات وتحليل الخطاب.</p>
        <div class="content">
            <a href="#" class="btn">تصفح البحوث العلمية</a>
        </div>
    </div>

</body>
</html>
