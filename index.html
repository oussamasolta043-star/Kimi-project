<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <title>منصة الأستاذ التعليمية</title>
    <style>
        body { background-color: #000; color: #d4af37; font-family: Arial, sans-serif; text-align: center; padding: 50px; }
        h1 { margin-bottom: 40px; border-bottom: 2px solid #d4af37; display: inline-block; padding-bottom: 10px; }
        .doors { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .door { padding: 30px; border: 2px solid #d4af37; color: #d4af37; text-decoration: none; font-size: 18px; border-radius: 10px; transition: 0.3s; display: block; }
        .door:hover { background-color: #d4af37; color: #000; cursor: pointer; }
    </style>
</head>
<body>

    <h1>مرحباً بك في منصة الأستاذ</h1>
    <div class="doors" id="doors-container">
        <!-- سيتم إضافة الكتب هنا تلقائياً -->
    </div>

    <script>
        // ضع أسماء ملفاتك هنا بدقة (تأكد من مطابقة الحروف والرموز)
        const books = ["Book-1.pdf", "Book-2.pdf", "Book-3.pdf", "Book-4.pdf"]; 
        
        const container = document.getElementById('doors-container');
        books.forEach((book, index) => {
            const link = document.createElement('a');
            link.href = book;
            link.className = 'door';
            link.innerText = 'الكتاب / المحاضرة رقم ' + (index + 1);
            link.target = "_blank"; // لفتح الملف في صفحة جديدة
            container.appendChild(link);
        });
    </script>

</body>
</html>
