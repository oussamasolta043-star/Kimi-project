<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مناهل أدبية ونفحات لسانية</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            /* ربط الصورة كما هي دون أي إضافات */
            background-image: url('cover.jpg'); 
            background-repeat: no-repeat;
            background-position: center center;
            background-size: cover; /* تغطي الشاشة بالكامل مع الحفاظ على التناسب */
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* حاوية الأزرار لتكون فوق الصورة بشكل منسق */
        .buttons-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 200px; /* ضبط المسافة لتكون تحت النص الموجود في الصورة */
        }

        .btn {
            background: rgba(0, 0, 0, 0.6);
            color: #d4af37;
            padding: 15px 40px;
            text-decoration: none;
            border: 1px solid #d4af37;
            border-radius: 30px;
            font-size: 1.2rem;
            text-align: center;
            transition: 0.3s;
        }

        .btn:hover { background: #d4af37; color: #000; }
    </style>
</head>
<body>

    <div class="buttons-container">
        <a href="linguistics.pdf" class="btn">علم اللسانيات</a>
        <a href="discourse.pdf" class="btn">تحليل الخطاب</a>
        <a href="arabic.pdf" class="btn">علم اللغة العربية</a>
        <a href="studies.pdf" class="btn">مقاربات لغوية</a>
    </div>

</body>
</html>
