<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مشروع الأستاذ الباحث أسامة سلطاني</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%; /* تأكيد على أخذ كامل ارتفاع المتصفح */
            width: 100%;  /* تأكيد على أخذ كامل عرض المتصفح */
        }

        body {
            /* استخدمنا اسم الملف الجديد .png */
            background-image: url('1000287140.png');
            background-size: cover; /* تجعل الصورة تغطي كامل المساحة دون فراغات */
            background-position: center center; /* توسيط الصورة في المنتصف */
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        /* تنسيق الأزرار الشفافة فوق الأيقونات */
        .hotspot {
            position: absolute;
            z-index: 10;
            cursor: pointer;
        }
    </style>
</head>
