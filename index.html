<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; padding: 0; display: flex; justify-content: center; background-color: #0b121f; }
        
        /* الحاوية تحافظ على الصورة كاملة */
        .container { position: relative; width: 100%; max-width: 600px; }
        
        /* الصورة تظهر كاملة وبأبعادها الصحيحة */
        .page-img { width: 100%; height: auto; display: block; }

        /* الأزرار الشفافة */
        .hotspot {
            position: absolute;
            z-index: 10;
            cursor: pointer;
            /* أزل border أو background إذا أردت إخفاء الإطار نهائياً */
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="background.png" class="page-img">

        <a href="section1.html" class="hotspot" style="top: 45%; left: 10%; width: 35%; height: 20%;"></a>
        <a href="section2.html" class="hotspot" style="top: 45%; left: 55%; width: 35%; height: 20%;"></a>
        <a href="section3.html" class="hotspot" style="top: 75%; left: 10%; width: 35%; height: 20%;"></a>
        <a href="section4.html" class="hotspot" style="top: 75%; left: 55%; width: 35%; height: 20%;"></a>
    </div>

</body>
</html>
