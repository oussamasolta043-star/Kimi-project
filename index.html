<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>موقع Kimi Project العلمي</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Amiri', serif; background: #f4eadd; color: #4a3728; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: #fff; padding: 40px; border: 8px double #8b4513; border-radius: 20px; }
        h1 { text-align: center; color: #8b4513; border-bottom: 2px solid #8b4513; padding-bottom: 10px; }
        h2 { color: #5c3010; background: #fdf5e6; padding: 10px; border-right: 5px solid #d4af37; margin-top: 40px; }
        .section-content { margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>مشروع كيمي - Kimi Project</h1>

        <!-- قسم البحوث -->
        <section>
            <h2>البحوث والتحليل اللساني</h2>
            <div class="section-content">
                <p>هنا تضع ملخص بحثك الأول مع روابط التحميل.</p>
                <p>هنا تضع ملخص بحثك الثاني وهكذا...</p>
            </div>
        </section>

        <!-- قسم المقالات -->
        <section>
            <h2>المقالات اللغوية</h2>
            <div class="section-content">
                <p>ضع مقالاتك هنا بتنسيق فقرات مرتبة.</p>
            </div>
        </section>

        <!-- قسم الدروس -->
        <section>
            <h2>الدروس والتطبيقات</h2>
            <div class="section-content">
                <p>ضع جداول دروسك أو روابط تحميلها هنا.</p>
            </div>
        </section>

    </div>
</body>
</html>
